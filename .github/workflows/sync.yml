name: Sync Kotek Dashboard

on:
  # Lance la sync automatiquement toutes les 30 minutes
  schedule:
    - cron: '*/30 * * * *'
  # Permet aussi de lancer manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installe Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Installe les dépendances (paramiko pour SFTP)
      - name: Install dependencies
        run: pip install paramiko

      # 4. Lance le script de sync
      # Le mot de passe SFTP est lu depuis les secrets GitHub (jamais visible)
      - name: Run sync script
        env:
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: python sync_atm10.py --auto-once

      # 5. Si data.json a changé, commit et push automatiquement
      - name: Commit and push data.json
        run: |
          git config user.name "Kotek Bot"
          git config user.email "bot@kotek.local"
          git add data.json
          # Ne commit que si data.json a vraiment changé
          git diff --staged --quiet || git commit -m "🔄 Sync stats $(date +'%Y-%m-%d %H:%M')"
          git push
