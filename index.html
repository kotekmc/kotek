<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kotek — ATM10</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --sun:#f97316;--sun-l:#fbbf24;--sun-d:#c2410c;
  --bg:#0f1923;--bg2:#162233;--card:rgba(22,34,51,0.9);--card2:rgba(15,25,35,0.94);
  --border:rgba(249,115,22,0.2);--border2:rgba(249,115,22,0.08);
  --text:#f1f5f9;--text-d:#94a3b8;--text-dd:#475569;
  --gold:#fbbf24;--silver:#cbd5e1;--bronze:#cd7f32;--red:#ef4444;--explore:#10b981;
  --nav-h:68px;--r:14px;--r-sm:8px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}

nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(15,25,35,0.75);backdrop-filter:blur(20px);border-bottom:1px solid rgba(249,115,22,0.15);}
.nav-logo{display:flex;align-items:center;gap:12px;cursor:pointer;}
.nav-logo-txt{font-family:'Fredoka One',sans-serif;font-size:1.5rem;color:var(--sun-l);}
.nav-tabs{display:flex;gap:6px;}
.nav-tab{font-weight:700;padding:8px 22px;cursor:pointer;background:transparent;border:1.5px solid transparent;border-radius:50px;color:var(--text-d);transition:all .2s;}
.nav-tab.active{background:linear-gradient(135deg,var(--sun),var(--sun-d));color:#fff;}

.page{display:none;min-height:100vh;}
.page.active{display:block;}

.hero-section{position:relative;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:url('background.png') center center/cover no-repeat;}
.hero-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:22px;text-align:center;}
.hero-title{font-family:'Fredoka One',sans-serif;font-size:clamp(3rem,8vw,6rem);color:#fff;text-shadow:0 4px 30px rgba(0,0,0,.8);}

.wrap{max-width:1200px;margin:0 auto;padding:0 28px;}
.sec-header{display:flex;align-items:center;gap:14px;margin:48px 0 22px;}
.sec-header h2{font-family:'Fredoka One',sans-serif;font-size:1.4rem;color:var(--text);}
.sec-line{flex:1;height:2px;background:linear-gradient(90deg,rgba(249,115,22,.4),transparent);}

/* Hall of Fame - Grille 3 colonnes */
.lb-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));gap:20px;}
.lb-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.lb-hd{display:flex;align-items:center;gap:10px;padding:14px 20px;background:rgba(0,0,0,.2);}
.lb-hd-t{font-family:'Fredoka One',sans-serif;font-size:.95rem;}

.podium-wrap{display:flex;align-items:flex-end;justify-content:center;gap:12px;padding:28px 20px 0;min-height:220px;}
.podium-col{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;cursor:pointer;}
.podium-av{image-rendering:pixelated;background:var(--bg2);border-radius:8px;width:52px;height:52px;border:2px solid transparent;}
.rank-1 .podium-av{width:64px;height:64px;border-color:var(--gold);}
.podium-name{font-size:.75rem;font-weight:800;text-align:center;}
.podium-val{font-family:'Fredoka One',sans-serif;font-size:.85rem;}

.psg{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-top:28px;}
.psc{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:20px;border-left:4px solid var(--sun);}
.psc.ex{border-left-color:var(--explore);} /* Couleur Exploration */

/* Accordions Boss & Sorts */
.acc-group{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:10px;}
.acc-trigger{width:100%;padding:14px 18px;background:rgba(0,0,0,.18);border:none;cursor:pointer;display:flex;align-items:center;gap:12px;color:white;}
.acc-body{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1px;background:var(--border2);max-height:0;overflow:hidden;transition:max-height .3s;}
.acc-body.open{max-height:1000px;}
.acc-entry{display:flex;align-items:center;gap:11px;padding:11px 15px;background:var(--card);}

.quest-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:24px 26px;}
.qt-track{height:14px;background:rgba(0,0,0,.5);border-radius:50px;overflow:hidden;margin-top:10px;}
.qt-fill{height:100%;background:linear-gradient(90deg,var(--sun-d),var(--sun-l));transition:width 1s;}

footer{text-align:center;padding:24px;border-top:1px solid var(--border2);font-size:.82rem;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo" onclick="goTo('serveur')">
    <span class="nav-logo-txt">Kotek</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-serveur" onclick="goTo('serveur')">⚔️ Serveur</button>
    <button class="nav-tab" id="tab-joueurs" onclick="goTo('joueurs')">👥 Joueurs</button>
  </div>
  <div style="width:80px;"></div>
</nav>

<div class="page active" id="page-serveur">
  <div class="hero-section">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <h1 class="hero-title">Kotek</h1>
      <div style="color:white; font-weight:700;">All The Mods 10 · Serveur Privé</div>
    </div>
  </div>

  <div class="section-a">
    <div class="wrap">
      <div class="sec-header"><span class="sec-icon">🏆</span><h2>Hall of Fame</h2><div class="sec-line"></div></div>
      <div class="lb-grid">
        <div class="lb-box">
          <div class="lb-hd"><span class="lb-hd-ico">⏱️</span><span class="lb-hd-t">Temps de Jeu</span></div>
          <div class="podium-wrap" id="lb-time"></div>
        </div>
        <div class="lb-box">
          <div class="lb-hd"><span class="lb-hd-ico">☠️</span><span class="lb-hd-t" style="color:var(--sun);">Boss Uniques</span></div>
          <div class="podium-wrap" id="lb-boss"></div>
        </div>
        <div class="lb-box">
          <div class="lb-hd"><span class="lb-hd-ico">🗺️</span><span class="lb-hd-t" style="color:var(--explore);">Exploration</span></div>
          <div class="podium-wrap" id="lb-chunks"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-joueurs">
  <div class="wrap" style="padding-top:100px;">
    <div class="sec-header"><h2>Aventuriers</h2><div class="sec-line"></div></div>
    <div id="pgrid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:16px;"></div>
  </div>
</div>

<div class="page" id="page-profil">
  <div class="wrap" style="padding-top:100px;">
    <div onclick="goTo('joueurs')" style="cursor:pointer; color:var(--text-d); margin-bottom:20px;">← Retour</div>
    <div style="display:flex; gap:20px; align-items:center;">
      <img id="pav" style="width:100px; height:100px; border-radius:10px; background:var(--bg2);">
      <div>
        <h2 id="pname" style="font-family:'Fredoka One'; font-size:2rem; color:var(--sun-l);"></h2>
        <div id="pteam" style="font-weight:700; color:var(--text-d);"></div>
      </div>
    </div>
    
    <div class="psg">
      <div class="psc"><div>⏳</div><div style="font-size:.7rem; font-weight:800; color:var(--text-d);">TEMPS DE JEU</div><div class="psc-val" id="p-time"></div></div>
      <div class="psc ex"><div>🗺️</div><div style="font-size:.7rem; font-weight:800; color:var(--text-d);">CHUNKS CHARGÉS</div><div class="psc-val" id="p-chunks"></div></div>
      <div class="psc" style="border-left-color:var(--red);"><div>⚔️</div><div style="font-size:.7rem; font-weight:800; color:var(--text-d);">RATIO K/D</div><div class="psc-val" id="p-kd"></div></div>
    </div>

    <div class="sec-header"><h2>Progression Quêtes</h2><div class="sec-line"></div></div>
    <div class="quest-box">
      <div style="display:flex; justify-content:space-between; font-weight:800;">
        <span>FTB Quests</span>
        <span id="p-qfrac"></span>
      </div>
      <div class="qt-track"><div class="qt-fill" id="p-qbar"></div></div>
    </div>

    <div class="sec-header"><h2>Boss Vaincus</h2><div class="sec-line"></div></div>
    <div id="p-bosses"></div>

    <div class="sec-header"><h2>Sorts Iron's Spells</h2><div class="sec-line"></div></div>
    <div id="p-spells"></div>
  </div>
</div>

<footer><span>⚔</span> All The Mods 10 — Kotek <span>⚔</span></footer>

<script>
const BOSS_REGISTRY=[
  {id:"minecraft:ender_dragon",name:"Ender Dragon",icon:"🐉",mod:"vanilla",modName:"Vanilla"},
  {id:"minecraft:wither",name:"Wither",icon:"💀",mod:"vanilla",modName:"Vanilla"},
  {id:"cataclysm:ignis",name:"Ignis",icon:"🔥",mod:"cataclysm",modName:"Cataclysm"},
  {id:"cataclysm:avaricia",name:"Avaricia",icon:"💰",mod:"cataclysm",modName:"Cataclysm"},
  {id:"twilightforest:naga",name:"Naga",icon:"🐍",mod:"twilight",modName:"Twilight Forest"}
];
const BOSS_MAP=Object.fromEntries(BOSS_REGISTRY.map(b=>[b.id,b]));

const SPELL_MAP={
  "irons_spellbooks:fireball": {name:"Fireball", school:"Fire", maxLevel:10},
  "irons_spellbooks:heal": {name:"Heal", school:"Holy", maxLevel:10},
  "irons_spellbooks:blink": {name:"Blink", school:"Void", maxLevel:10}
};

let DATA = null;
const g = id => document.getElementById(id);

async function load(){
  try{
    const r = await fetch('data.json?t='+Date.now());
    DATA = await r.json();
    renderAll();
  }catch(e){ console.error(e); }
}

function goTo(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  g('page-'+p).classList.add('active');
  window.scrollTo(0,0);
}

// Logic Boss Uniques
function bossUniqueCount(p) {
  const killed = p.stats?.["minecraft:killed"] || {};
  return Object.keys(killed).filter(id => BOSS_MAP[id]).length;
}

function renderAll(){
  const pl = DATA.players || [];
  renderLB(pl);
  renderJoueurs(pl);
}

function renderLB(pl){
  // Temps
  makePodium([...pl].sort((a,b)=>(b.playtime_ticks||0)-(a.playtime_ticks||0)), p=>p.playtime_human, p=>p.playtime_ticks, 'lb-time');
  
  // Boss Uniques
  const byBoss = [...pl].sort((a,b)=>bossUniqueCount(b)-bossUniqueCount(a));
  makePodium(byBoss, p => bossUniqueCount(p) + ' boss', bossUniqueCount, 'lb-boss');
  
  // Chunks
  const byChunks = [...pl].sort((a,b)=>(b.chunks_loaded||0)-(a.chunks_loaded||0));
  makePodium(byChunks, p => (p.chunks_loaded||0).toLocaleString() + ' ch', p => p.chunks_loaded, 'lb-chunks');
}

function makePodium(sorted, valFn, rawFn, id){
  const wrap = g(id); wrap.innerHTML = '';
  const top3 = sorted.filter(p=>rawFn(p)>0).slice(0,3);
  if(!top3.length) { wrap.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-dd);">Aucune donnée</div>'; return; }
  
  top3.forEach((p,i) => {
    const d = document.createElement('div');
    d.className = `podium-col rank-${i+1}`;
    d.onclick = () => openProfile(p.uuid);
    d.innerHTML = `
      <img class="podium-av" src="https://mc-heads.net/avatar/${p.uuid}/64">
      <div class="podium-name">${p.name}</div>
      <div class="podium-val">${valFn(p)}</div>
    `;
    wrap.appendChild(d);
  });
}

function renderJoueurs(pl){
  const grid = g('pgrid'); grid.innerHTML = '';
  pl.forEach(p => {
    const d = document.createElement('div');
    d.style = "background:var(--card); padding:20px; border-radius:10px; text-align:center; cursor:pointer;";
    d.onclick = () => openProfile(p.uuid);
    d.innerHTML = `<img src="https://mc-heads.net/avatar/${p.uuid}/64" style="width:64px; margin-bottom:10px;"><div style="font-weight:800;">${p.name}</div>`;
    grid.appendChild(d);
  });
}

function openProfile(uuid){
  const p = DATA.players.find(x=>x.uuid===uuid);
  goTo('profil');
  g('pav').src = `https://mc-heads.net/avatar/${p.uuid}/100`;
  g('pname').textContent = p.name;
  g('pteam').textContent = p.team ? '⚐ ' + p.team : '👤 Solo';
  g('p-time').textContent = p.playtime_human;
  g('p-chunks').textContent = (p.chunks_loaded || 0).toLocaleString(); //
  g('p-kd').textContent = p.kd;

  // FTB Quests fix
  const qDone = p.ftb_quests_done || 0;
  const qTotal = p.ftb_quests_total || 1;
  const pct = Math.round((qDone/qTotal)*100);
  g('p-qfrac').textContent = `${qDone} / ${qTotal}`;
  g('p-qbar').style.width = pct + '%';

  // Boss & Sorts (Simplified render)
  g('p-bosses').innerHTML = p.bosses.map(b => `<div style="padding:10px; background:var(--card2); margin-bottom:5px; border-radius:5px;">${b.icon} ${b.name} x${b.count}</div>`).join('') || 'Aucun boss';
  
  g('p-spells').innerHTML = p.spells.map(s => {
    const info = SPELL_MAP[s.id] || {name: s.id, school: 'Unknown', maxLevel: '?'};
    return `<div style="padding:10px; background:var(--card2); margin-bottom:5px; border-radius:5px;">✨ <b>${info.name}</b> (Niveau ${s.level} / ${info.maxLevel})</div>`;
  }).join('') || 'Aucun sort';
}

load();
</script>
</body>
</html>
